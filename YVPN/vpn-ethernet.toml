# VPN Ethernet Configuration
# This file configures VPN settings for ethernet connections

[vpn]
enabled = true
protocol = "wireguard"
# protocol = "openvpn"  # Alternative option

[ethernet]
interface = "eth0"
dhcp = true
# Static IP configuration (uncomment to use)
# ip_address = "192.168.1.100"
# subnet_mask = "255.255.255.0"
# gateway = "192.168.1.1"
# dns = ["8.8.8.8", "8.8.4.4"]

[wireguard]
private_key = "p1-server-key.key"
address = "10.0.0.2/32"
dns = ["1.1.1.1", "1.0.0.1"]

[wireguard.peer]
public_key = "p2-server-key.key"
endpoint = "vpn.example.com:51820"
allowed_ips = ["0.0.0.0/0"]
persistent_keepalive = 25

[logging]
level = "info"
# level = "debug"
output = "/var/log/vpn.log"

[connection]
auto_connect = true
reconnect_interval = 30
timeout = 10
services:
  macosm:
    image: dockurr/macos
    container_name: maXCS
    environment:
      VERSION: "26"
      CPU_CORES: "16"
      RAM_SIZE: "59G"
      DISK_SIZE: "256G"
      WIDTH: "1680"
      HEIGHT: "1050"
      GPU: "Y"
    devices:
      - /dev/kvm
      - /dev/net/tun
      - /dev/dri
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 5900:5900/tcp
      - 5900:5900/udp
    volumes:
      - data:/storage:rw
      - ./macos:/storage
    stop_grace_period: 20m
